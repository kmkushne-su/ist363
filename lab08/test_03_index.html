<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&amp;display=swap" rel="stylesheet">
    <style>
        body {font-family: Verdana, Geneva, Tahoma, sans-serif; color: #ffffff; text-align: center;} 
        .container {background-color: #000000; padding: 40px; border-radius: 20px; width: 700px; margin: 20px auto; position: relative;} 
        #gameboard, #scoreboard, #playbutton {display: flex; width: 90%; margin: 20px auto;} 
        #gameboard .chars, #scoreboard div, #playbutton button {flex: 1; text-align: center;} 
        .chars img {width: 100%;} 
        .fireball img {width: 80px;} 
        .fireball {flex: 4;} 
        #fireballleft {position: absolute; left: 180px; top: 150px;} 
        #fireballright {rotate: 180deg; position: absolute; left: 500px; top: 150px;} 

        .animate-left {
            animation: moveLeft 0.5s ease-in-out forwards;
        }
        .animate-right {
            animation: moveRight 0.5s ease-in-out forwards;
        }

        @keyframes moveLeft {
            0% {left: 180px; transform: scaleX(1)}
            99% {transform: scaleX(1)}
            100% {left: 500px; transform: scaleX(-1)}
        }

        @keyframes moveRight {
            0% {left: 500px; transform: scaleX(1)}
            99% {transform: scaleX(1)}
            100% {left: 180px; transform: scaleX(-1)}
        }

        .medievalsharp-regular {font-family: "MedievalSharp", cursive; font-weight: 400; font-style: normal;} 
        button { 
            background: #ffbf7f; background-image: -webkit-linear-gradient(top, #ffbf7f, #ff8000); background-image: -moz-linear-gradient(top, #ffbf7f, #ff8000); background-image: -ms-linear-gradient(top, #ffbf7f, #ff8000); background-image: -o-linear-gradient(top, #ffbf7f, #ff8000); background-image: linear-gradient(to bottom, #ffbf7f, #ff8000); 
            color: white; border: 0px; padding: 10px 20px 10px 20px; 
        } 
        button:hover {background: #ff8000; background-image: -webkit-linear-gradient(top, #ff8000, #ff8000); background-image: -moz-linear-gradient(top, #ff8000, #ff8000); background-image: -ms-linear-gradient(top, #ff8000, #ff8000); background-image: -o-linear-gradient(top, #ff8000, #ff8000); background-image: linear-gradient(to bottom, #ff8000, #ff8000); } 
        p { font-size: 20px;font-weight: bold;text-align: center;width: 100%;} 
    </style>
</head> 
<body> 
    <div class="container"> 
        <h1 class="medievalsharp-regular">Fireball Duel</h1> 
        <div id="gameboard"> 
            <div class="chars"><img src="images/monster.jpg" alt="monster" id="monster"></div> 
            <div class="fireball"> 
                <img src="images/fireball.gif" alt="fireball" id="fireballleft"> 
                <img src="images/fireball.gif" alt="fireball" id="fireballright"> 
            </div> 
            <div class="chars"><img src="images/girl.jpg" alt="girl" id="girl"></div> 
        </div> 
        <div id="scoreboard"> 
            <div>Monster Shield: <span id="mscore">100</span>%</div> 
            <div>Girl Shield: <span id="gscore">100</span>%</div> 
        </div> 
        <div id="playbutton"><button>Throw Fireball</button></div> 
    </div> 
    <script>
        // Step 1: Set Up Variables
        let monsterShield = 100;
        let girlShield = 100;

        // Step 2: Event Listener ---
        document.getElementById("playbutton").addEventListener("click", playGame);

        function animateFireball() {
            const fireballLeft = document.getElementById("fireballleft");
            const fireballRight = document.getElementById("fireballright");
            
            fireballLeft.classList.remove("animate-left");
            fireballRight.classList.remove("animate-right");

            setTimeout(() => {
                fireballLeft.classList.add("animate-left");
                fireballRight.classList.add("animate-right");
            }, 10);
        }

        function playGame() {
            animateFireball(); 

            // Step 4: Throwing Power
            let monsterDamage = Math.floor(Math.random() * 20) + 1;
            let girlDamage = Math.floor(Math.random() * 20) + 1;

            // Step 4: Decrease Shield Power
            monsterShield -= girlDamage; // Girl throws at monster
            girlShield -= monsterDamage; // Monster throws at girl

            // Step 4: Update DOM with new shield powers
            document.getElementById("mscore").innerText = monsterShield;
            document.getElementById("gscore").innerText = girlShield;

            // Step 5: Check for Winner/Loser
            let message = "";
            if (monsterShield <= 0 && girlShield <= 0) {
                message = "Both Lose";
                handleLoss('monster'); 
                handleLoss('girl'); 
            } else if (monsterShield <= 0) {
                message = "Girl Wins";
                handleLoss('monster'); 
            } else if (girlShield <= 0) {
                message = "Monster Wins";
                handleLoss('girl'); 
            }

            // Step 5b: JavaScript Checker
            function handleLoss(loser) {
                const monsterImg = document.getElementById('monster');
                const girlImg = document.getElementById('girl');
                if (loser === 'monster') {
                    monsterImg.src = 'images/boom.png';
                } else if (loser === 'girl') {
                    girlImg.src = 'images/boom.png';
                }
            }
            if (message !== "") {
                const playButton = document.getElementById("playbutton");
                let resultDisplay = document.getElementById("result-display");
                if (!resultDisplay) {
                    resultDisplay = document.createElement("div");
                    resultDisplay.id = "result-display";
                    playButton.parentNode.insertBefore(resultDisplay, playButton);
                }
                resultDisplay.innerHTML = `<strong style="font-size: 1.5em; padding: 2em;">${message}</strong>`;
                playButton.style.display = "none";
            }
        }
    </script> 
</body></html>
